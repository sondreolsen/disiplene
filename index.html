<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jesu 12 disipler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="hero-layout">
      <aside class="verse verse-left">
        <p class="verse-reference">Matteus 4,19</p>
        <p class="verse-text">«Han sa til dem: ‘Kom, følg meg, så vil jeg gjøre dere til menneskefiskere!’»</p>
      </aside>

      <header class="hero">
        <h1>Jesu 12 disipler</h1>
        <p class="intro">
          Klikk på bildene av disiplene for å bli bedre kjent med dem
        </p>
      </header>

      <aside class="verse verse-right">
        <p class="verse-reference">Johannes 13,35</p>
        <p class="verse-text">«Ved dette skal alle forstå at dere er mine disipler: at dere har kjærlighet til hverandre.»</p>
      </aside>
    </section>

    <section class="disciples-grid" id="disciples-grid" aria-label="De tolv disiplene"></section>
  </main>

  <template id="disciple-card-template">
    <article class="disciple-card">
      <button class="card-toggle" type="button">
        <span class="sr-only">Vis mer informasjon</span>
        <span class="card-inner">
          <span class="card-face card-front">
            <span class="portrait-frame">
              <img class="portrait" alt="">
            </span>
            <span class="disciple-name"></span>
          </span>
          <span class="card-face card-back">
            <span class="disciple-name disciple-name-back"></span>
            <span class="disciple-detail"></span>
          </span>
        </span>
      </button>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
